# SZA POWER production reverse proxy
# Replace the domain and certificate paths before enabling this file.
limit_req_zone $binary_remote_addr zone=sza_public:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=sza_admin:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    server_tokens off;

    # Keep large media uploads working; put CDN/object storage in front for multi-GB files.
    client_max_body_size 0;
    client_body_timeout 3600s;

    location ~ /\. { deny all; }
    location /api/auth/ { limit_req zone=sza_admin burst=10 nodelay; proxy_pass http://127.0.0.1:3000; include /etc/nginx/proxy_params; }
    location /api/admin/ { limit_req zone=sza_admin burst=20 nodelay; proxy_pass http://127.0.0.1:3000; include /etc/nginx/proxy_params; }
    location / {
        limit_req zone=sza_public burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_request_buffering off;
    }
}